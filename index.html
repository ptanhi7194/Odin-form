<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="whole">
    <div class="banner">
    <div class="ban">
      <img class="logo" src="/home/hiden/Downloads/odin-lined.png" alt="logo">
      <h1 class="text">Odin</h1>
    </div>
    <p class="src">photo by hale west on unsplash</p>
    </div>
    <div class="right">
    <div class="top">
        <p class="paragraph">This is not a real online service! you know you need something
            like this in real life to help you realize your deepest dreams.
            sign up now to get started
        </p>
        <p class="line">You know you want to.</p>
    </div>
    <div class="middle">
        <h3 class="heading">Lets do This!</h3>
        <form class="form">
            <div class="row1">
            <div class = fname>
                <label for="first-name">First name</label>
                <input type="text" id="first-name" name="first-name"> 
            </div>
            <div class = email>
                <label for="email">Email</label>
                <input type="text" id="email" name="email"> 
            </div>
            <div class = password>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8"> 
            </div>
            </div>
             <div class="row2">
            <div class = lname>
                <label for="Last-name">Last name</label>
                <input type="text" id="Last-name" name="Last-name"> 
            </div>
            <div class = phone-no>
                <label for="phone">Phone number</label>
                <input type="tel" id="phone" name="phone"> 
            </div>
            <div class = cpassword>
                <label for="cpassword">Confirm Password</label>
                <input type="password" id="cpassword" name="cpassword" required minlength="8"> 
            </div>
            </div>
        </form>
    </div>
    <div class="bottom">
        <button class="acc">Create account</button> 
        <h5 class="final">Already have an accout?<a href="#">log in</a></h5>
    </div>
    </div>
    </div>
</body>
</html>
